          if (dow === 0 || i === days.length - 1) {
            if (week.length > 0) {
              const avg = (k) => { const vs = week.filter(x => x[k] !== null && x[k] !== undefined).map(x => num0(x[k])); return vs.length ? Math.round(vs.reduce((a, b) => a + b, 0) / vs.length * 10) / 10 : 0; };
              const wk = { date: week[0].date, day: week[0].date.slice(5), label: week[0].date.slice(5), cal: avg('cal'), protein: avg('protein'), sleep: avg('sleep'), water: avg('water'), microsMet: avg('microsMet'), weight: avg('weight'), bodyFat: avg('bodyFat'), waist: avg('waist'), skeletalMuscle: avg('skeletalMuscle'), visceralFat: avg('visceralFat') };
              if (extraKey) wk[extraKey] = avg(extraKey);
              wk.netCal = avg('netCal');
              weeks.push(wk);
            }
            week = [];
          }
        });
        return weeks;
      }

      window.chartBarsRef = function (data, key, color, maxVal, refVal) {
        const vals = data.map(d => num0(d[key]));
        if (!maxVal) maxVal = Math.max(...vals, 1);
        if (refVal && refVal > maxVal) maxVal = refVal * 1.1;
        const refPct = refVal ? (1 - refVal / maxVal) * 100 : null;
        const showLabels = data.length <= 14;
        return `<div style="position:relative"><div class="chart-bars">${data.map((d, i) => {
          const v = num0(d[key]); const h = maxVal > 0 ? (v / maxVal) * 75 : 0;
          const tipLabel = `${d.day || d.date?.slice(5) || ''}: ${v}`;
          return `<div class="chart-bar-wrap" tabindex="0" role="button" onclick="this.classList.toggle('active')" onblur="this.classList.remove('active')" style="position:relative">
            <div class="chart-bar-val">${showLabels ? (v || '') : ''}</div>
            <div class="chart-bar" style="height:${Math.max(2, h)}px;background:${color}"></div>
            ${showLabels ? `<div class="chart-bar-label">${d.day || d.date?.slice(5) || ''}</div>` : ''}
            <div class="chart-tip-bar" style="position:absolute;bottom:calc(${Math.max(2, h)}px + 22px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:.68rem;white-space:nowrap;z-index:10">${tipLabel}</div>
          </div>`;
        }).join("")}</div>${refPct !== null ? `<div style="position:absolute;left:0;right:0;top:calc(${refPct}% + 11px);border-top:1.5px dashed var(--muted);opacity:.5"><span style="position:absolute;right:0;top:-13px;font-size:.65rem;color:var(--muted)">${refVal}</span></div>` : ''}</div>`;
      }

      // Line chart with axes, spherical markers, and optional reference line
      window.lineChart = function (data, key, color, unit, refVal) {
        let pts = data.map((d, i) => ({ i, v: d[key] !== null && d[key] !== undefined ? +d[key] : NaN, label: d.day || d.date?.slice(5) || '', date: d.date })).filter(p => isFinite(p.v));
        if (key !== 'netCal' && key !== 'microsMet') pts = pts.filter(p => p.v !== 0);
        if (pts.length < 1) return `<div class="empty-state">Not enough data to show</div>`;
        const W = 340, H = 110, L = 38, R = 15, T = 10, B = 22;
        let minV = Math.min(...pts.map(p => p.v)), maxV = Math.max(...pts.map(p => p.v));
        if (refVal !== undefined) { minV = Math.min(minV, refVal); maxV = Math.max(maxV, refVal); }
        if (minV === maxV) { minV -= 1; maxV += 1; } else { const pad = (maxV - minV) * .12; minV -= pad; maxV += pad; }
        const xFor = i => pts.length > 1 ? L + (i / (data.length - 1)) * (W - L - R) : L + (W - L - R) / 2;
        const yFor = v => T + (1 - ((v - minV) / (maxV - minV))) * (H - T - B);
        const poly = pts.map(p => `${xFor(p.i).toFixed(1)},${yFor(p.v).toFixed(1)}`).join(" ");
        // Y-axis: 4 ticks
        const yTicks = [0, 1, 2, 3].map(i => { const v = minV + (maxV - minV) * i / 3; return { v, y: yFor(v) }; });
        // X-axis labels: first, middle, last
        const xLabels = [{ i: 0, p: data[0], align: 'start' }, { i: Math.floor(data.length / 2), p: data[Math.floor(data.length / 2)], align: 'middle' }, { i: data.length - 1, p: data[data.length - 1], align: 'end' }];
        const refLine = refVal !== undefined ? `<line x1="${L}" y1="${yFor(refVal).toFixed(1)}" x2="${W - R}" y2="${yFor(refVal).toFixed(1)}" stroke="var(--muted)" stroke-width=".5" stroke-dasharray="3,2" opacity=".6"/><text x="${W - R - 2}" y="${yFor(refVal) - 3}" fill="var(--muted)" font-size="7" text-anchor="end" opacity=".8">${refVal}${unit ? ' ' + unit : ''}</text>` : '';
        // Tooltip: clamp tip box inside SVG bounds
        const tipW = 42, tipH = 15;
        const tipPoints = pts.map((p, idx) => {
          const cx = xFor(p.i), cy = yFor(p.v);
          let tx = cx - tipW / 2; let ty = cy - tipH - 4;
          if (tx < L) tx = L; if (tx + tipW > W - R) tx = W - R - tipW;
          if (ty < T) ty = cy + 6;
          const label = `${p.label || p.date?.slice(5) || ''}  ${p.v}${unit ? unit : ''}`;
          return { cx, cy, tx, ty, label, idx };
        });
        return `<div class="trend"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" ontouchstart="">
        <!-- grid lines -->
        ${yTicks.map(t => `<line x1="${L}" y1="${t.y.toFixed(1)}" x2="${W - R}" y2="${t.y.toFixed(1)}" stroke="var(--border)" stroke-width=".3"/>`).join('')}
        <!-- y-axis labels -->
        ${yTicks.map(t => `<text x="${L - 3}" y="${t.y.toFixed(1)}" fill="var(--muted)" font-size="7" text-anchor="end" dominant-baseline="middle">${Math.round(t.v)}</text>`).join('')}
        <!-- ref line -->
        ${refLine}
        <!-- data line -->
        <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- data points with tooltips -->
        ${tipPoints.map(p => `<g class="chart-pt" tabindex="0" role="button" onclick="this.classList.toggle('active')" onblur="this.classList.remove('active')">
          <circle cx="${p.cx.toFixed(1)}" cy="${p.cy.toFixed(1)}" r="5" fill="transparent"/>
          <circle cx="${p.cx.toFixed(1)}" cy="${p.cy.toFixed(1)}" r="2.5" fill="${color}" stroke="var(--bg)" stroke-width=".8"/>
          <g class="chart-tip">
            <rect x="${p.tx.toFixed(1)}" y="${p.ty.toFixed(1)}" width="${tipW}" height="${tipH}" rx="3" fill="var(--card)" stroke="var(--border)" stroke-width=".6"/>
            <text x="${(p.tx + tipW / 2).toFixed(1)}" y="${(p.ty + 10).toFixed(1)}" fill="var(--text)" font-size="7" text-anchor="middle">${p.label}</text>
          </g>
        </g>`).join('')}
        <!-- x-axis labels -->
        ${xLabels.map(x => `<text x="${xFor(x.i).toFixed(1)}" y="${H - 3}" fill="var(--muted)" font-size="7" text-anchor="${x.align}">${x.p.label || x.p.date?.slice(5) || ''}</text>`).join('')}
        <!-- axis lines -->
        <line x1="${L}" y1="${T}" x2="${L}" y2="${H - B}" stroke="var(--border)" stroke-width=".5"/>
        <line x1="${L}" y1="${H - B}" x2="${W - R}" y2="${H - B}" stroke="var(--border)" stroke-width=".5"/>
      </svg></div>`;
      }

      window.trendLineRef = function (days, key, color, unit, refVal) {
        return lineChart(days, key, color, unit, refVal);
      }

      /* ═══════════════════════════════════════════════════
         AI ADVISOR
         ═══════════════════════════════════════════════════ */
      let chatImageBase64 = null;
      window.handleChatPhoto = function (el) {
        if (!el.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
          chatImageBase64 = e.target.result;
          const img = document.getElementById("chatPhotoPreview");
          if (img) img.src = chatImageBase64;
          document.getElementById("chatPhotoPreviewContainer").style.display = "block";
        };
        reader.readAsDataURL(el.files[0]);
      }
      window.clearChatPhoto = function () {
        chatImageBase64 = null;
        document.getElementById("chatPhotoPreviewContainer").style.display = "none";
        document.getElementById("chatPhotoInput").value = "";
      }

      window.askAdvisor = async function (quick) {
        const input = document.getElementById("chatInput");
        const query = quick || input?.value?.trim();
        const hasImage = !!chatImageBase64;
        if (!query && !hasImage) return;

        let userMsg = query || (hasImage ? "Analyze this image." : "");
        appendChat("user", userMsg);

        if (input) input.value = "";
        const imageToSend = chatImageBase64;
        clearChatPhoto();

        const btn = document.getElementById("chatSendBtn"); if (btn) { btn.disabled = true; btn.textContent = "..."; }

        const t = computeTotals(dayData); const calTarget = getCalTarget();
        const microStr = MICROS.map(m => `${m.label}: ${(t.micros[m.key] || 0).toFixed(1)}/${m.target}${m.unit}`).join(', ');
        const summary = `Date: ${selectedDate}, Cal: ${t.cal}/${calTarget}, Protein: ${t.protein}/${TARGETS.protein}g, Carbs: ${t.carbs}/${TARGETS.carbs}g, Fat: ${t.fat}/${TARGETS.fat}g, Fiber: ${t.fiber}g, Water: ${dayData.water || 0}/${TARGETS.water}ml, Sleep: ${dayData.sleep?.hours || 0}/${TARGETS.sleep}h, Steps: ${dayData.steps || 0}, Burned: ${dayData.calBurned || 0} kcal\nMicros logged so far: ${microStr}\nFoods: ${activeItems(dayData.foods).map(f => f.name).join(", ") || "none"}`;
        const sys = `You are "HealThee Mate", a concise, warm, and highly capable health advisor for an Indian user doing a recomposition (cutting body fat, building muscle). Currency INR. Goals: ~2050 kcal training days, ~1850 rest days, 130-145g protein. Keep responses under 120 words. Use plain text only — do not use markdown, asterisks, bold, bullet points, or any special formatting.
IMPORTANT: When asked about micro gaps, macros, water, fiber, or exercise, you MUST base your answer strictly on the numerical totals provided below. DO NOT guess or calculate nutrients from the "Foods" array.
If the user asks for a recipe or cooking advice, check their macro constraints and suggest something that fits perfectly.
If the user uploaded a menu photo, identify the healthiest, highest-protein option that fits their goals.
Do NOT output JSON. Output regular conversational text.`;

        const prompt = `My current stats:\n${summary}\n\nQuestion: ${userMsg}`;

        try {
          let reply;
          if (hasImage) {
            reply = await fetchVisionLLM(prompt, sys, imageToSend, 'groq', 'llama-3.2-11b-vision-preview', false);
          } else {
            reply = await fetchLLM(prompt, sys, 'cerebras', 'llama3.1-8b', false);
          }
          let cleanReply = reply.trim()
            .replace(/\*\*(.*?)\*\*/gs, '$1').replace(/\*(.*?)\*/gs, '$1').replace(/_(.*?)_/gs, '$1')
            .replace(/^#{1,6}\s+/gm, '').replace(/^[-*]\s+/gm, '');
          appendChat("assistant", cleanReply);
        } catch (e) {
          appendChat("assistant", `Error: ${e.message}`);
          console.error(e);
        } finally {
          if (btn) { btn.disabled = false; btn.textContent = "Send"; }
        }
      }

      window.appendChat = function (role, text) {
        dayData.chatHistory = dayData.chatHistory || [];
        dayData.chatHistory.push({ role, text });
        touch(); saveDay();
        const c = document.getElementById("chatMessages"); if (!c) return;
        const msg = document.createElement("div"); msg.className = `chat-msg ${role}`; msg.textContent = text;
        c.appendChild(msg); c.scrollTop = c.scrollHeight;
      }

      /* ═══════════════════════════════════════════════════
         THEME
         ═══════════════════════════════════════════════════ */
      window.toggleTheme = function () {
        if (document.body.getAttribute("data-theme") === "dark") { document.body.removeAttribute("data-theme"); localStorage.setItem("theme", "light"); }
        else { document.body.setAttribute("data-theme", "dark"); localStorage.setItem("theme", "dark"); }
      }
      window.applyTheme = function () {
        const s = localStorage.getItem("theme");
        if (s === "dark") document.body.setAttribute("data-theme", "dark");
        else if (!s && window.matchMedia("(prefers-color-scheme:dark)").matches) document.body.setAttribute("data-theme", "dark");
      }
      window.applyTheme();

      /* ═══════════════════════════════════════════════════
         TOAST
         ═══════════════════════════════════════════════════ */
      window.toast = function (msg, type = "") {
        const el = document.getElementById("toast"); el.textContent = msg;
        el.className = "toast" + (type ? " " + type : "");
        requestAnimationFrame(() => el.classList.add("show"));
        setTimeout(() => el.classList.remove("show"), 2500);
      }
    }); // End of DOMContentLoaded block

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => { });
    }

    /* ── Auth loading pixel runner animation (dino-style) ─────────────────
       Placed last so any error here never blocks the rest of the app.      */
    try {
      (function () {
        const cvs = document.getElementById('authCanvas');
        if (!cvs) return;
        const ctx = cvs.getContext('2d');
        if (!ctx) return;

        const W = 220, H = 60;
        cvs.width = W; cvs.height = H;
        cvs.style.width = W + 'px'; cvs.style.height = H + 'px';

        const S = 3, GY = 50; // S = canvas px per game-pixel, GY = ground y

        const cs = getComputedStyle(document.documentElement);
        const CA = cs.getPropertyValue('--accent').trim() || '#5a9a5a';
        const CM = cs.getPropertyValue('--muted').trim() || '#888';

        // ── Pixel sprites (row-major strings, '1' = filled) ──────────────
        //
        // Stage 0 — Confused Noob (4w × 4h, hunched round blob)
        //   .##.   head
        //   ####   hunched body
        //   #.#.   legs A  /  .#.#  legs B
        //   #...   foot A  /  ...#  foot B
        //
        // Stage 1 — Trying Hard (5w × 6h, upright runner)
        //   .###.  head ×2 rows
        //   ..#..  neck
        //   #####  arms/body
        //   .#.#.  thighs
        //   #...#  feet A  /  .#..#  feet B
        //
        // Stage 2 — Greek God (5w × 8h, V-taper titan)
        //   .###.  head ×2 rows
        //   .###.  broad neck
        //   #####  wide chest ×2 rows
        //   ..#..  narrow waist
        //   #.#..  stride A  /  ..#.#  stride B
        //   #....  foot A   /  ....#  foot B

        const STAGES = [
          {
            cw: 4, ch: 4, spd: 0.7, vy: -6, g: 0.45, fr: 15, trig: 22,
            A: '0110111110101000', B: '0110111101010001'
          },
          {
            cw: 5, ch: 6, spd: 1.6, vy: -9, g: 0.45, fr: 9, trig: 45,
            A: '011100111000100111110101010001',
            B: '011100111000100111110101001001'
          },
          {
            cw: 5, ch: 8, spd: 3.0, vy: -13, g: 0.50, fr: 5, trig: 90,
            A: '0111001110011101111111111001001010010000',
            B: '0111001110011101111111111001000010100001'
          }
        ];

        // Transition at frame counts (stage 0 → 1 at 65, stage 1 → 2 at 130)
        const TRANS = [65, 130];

        // "?" mark above noob: 3w × 5h
        //   ##.  top of ?
        //   ..#  right curve
        //   .#.  bump
        //   ...  gap
        //   .#.  dot
        const QM = '110001010000010', QW = 3, QH = 5;

        // Crown on god: 5w × 2h
        //   #.#.#  points
        //   #####  base
        const CROWN = '1010111111', CRW = 5, CRH = 2;

        // Cactus obstacle: 3w × 5h
        const OBS = '010010111010010', OBW = 3, OBH = 5;

        function spr(px, pw, x, y, col) {
          ctx.fillStyle = col;
          for (let i = 0; i < px.length; i++) {
            if (px[i] === '1') ctx.fillRect(x + (i % pw) * S, y + Math.floor(i / pw) * S, S, S);
          }
        }

        const CHAR_X = 22;
        let tick = 0, si = 0;
        let floorY, charY, jumpVy = 0, jumping = false;
        let fr = 0, frm = 0;
        let obsX = W + 50;
        let flashCt = 0;
        let dashes = Array.from({ length: 8 }, (_, i) => 30 + i * 24);
        let raf, stopped = false;

        function resetStage() {
          const st = STAGES[si];
          floorY = GY - st.ch * S;
          charY = floorY; jumpVy = 0; jumping = false; fr = 0; frm = 0;
        }
        resetStage();

        function loop() {
          if (stopped) return;
          try {
            tick++;

            // Stage transitions
            if (si < TRANS.length && tick === TRANS[si]) {
              si++; flashCt = 10; resetStage();
            }

            const st = STAGES[si];
            ctx.clearRect(0, 0, W, H);

            // Ground line + scrolling speed dashes
            ctx.fillStyle = CM;
            ctx.fillRect(0, GY, W, 1);
            dashes = dashes.map(x => {
              const nx = ((x - st.spd) % (W + 10) + W + 10) % (W + 10);
              ctx.fillRect(nx, GY + 3, 9, 1);
              return nx;
            });

            // Jump trigger
            if (!jumping && obsX > CHAR_X && obsX < CHAR_X + st.cw * S + st.trig) {
              jumping = true; jumpVy = st.vy;
            }

            // Physics
            if (jumping) {
              charY += jumpVy; jumpVy += st.g;
              if (charY >= floorY) { charY = floorY; jumping = false; jumpVy = 0; }
            }

            // Run cycle (freeze airborne)
            if (!jumping && ++fr >= st.fr) { fr = 0; frm ^= 1; }

            // "?" bouncing above confused noob
            if (si === 0) {
              const bob = Math.round(Math.sin(tick * 0.25) * 2);
              const qx = CHAR_X + Math.floor((st.cw * S - QW * S) / 2);
              spr(QM, QW, qx, charY - QH * S - S + bob, CM);
            }

            // Crown on the Greek God
            if (si === 2 && flashCt === 0) {
              const crx = CHAR_X + Math.floor((st.cw * S - CRW * S) / 2);
              spr(CROWN, CRW, crx, charY - CRH * S - 1, CA);
            }

            // Flash accent↔muted on stage-up (reads as a "power-up" pop)
            const col = (flashCt > 0 && flashCt % 2 === 0) ? CM : CA;
            if (flashCt > 0) flashCt--;

            spr(frm === 0 ? st.A : st.B, st.cw, CHAR_X, charY, col);

            // Obstacle
            obsX -= st.spd;
            if (obsX < -(OBW * S)) obsX = W + 20 + Math.random() * 60;
            spr(OBS, OBW, obsX, GY - OBH * S, CM);

          } catch (_) { }
          raf = requestAnimationFrame(loop);
        }

        loop();

        const authEl = document.getElementById('authLoading');
        if (authEl) {
          new MutationObserver(function (_, obs) {
            if (authEl.style.display === 'none') {
              stopped = true; cancelAnimationFrame(raf); obs.disconnect();
            }
          }).observe(authEl, { attributes: true, attributeFilter: ['style'] });
        }
      })();
    } catch (_) { }
  </script>
</body>
