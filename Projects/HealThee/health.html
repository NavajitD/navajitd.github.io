<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HealThee</title>
  <meta name="description"
    content="HealThee is an all-in-one tracker for nutrition, workouts, body composition, and daily habits.">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♥</text></svg>">
  <!-- Preconnect to critical origins (LCP savings: googleapis ~380ms, apis.google ~350ms) -->
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://apis.google.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500;600;700&display=swap" media="print"
    onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500;600;700&display=swap">
  </noscript>
  <!-- Pinned version for reliable CDN caching (avoids @latest cache-busting) -->
  <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.js" defer></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0f0a" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Health">
  <style>
    /* Accessibility Fix: Darkened accent, muted, warn, and orange for better contrast in Light Mode */
    :root {
      --text: #0a1f00;
      --bg: #fff;
      --accent: #15803d;
      --muted: #4b5563;
      --border: #e5e7eb;
      --card: #f9fafb;
      --hover: rgba(22, 163, 74, .04);
      --success: #059669;
      --danger: #dc2626;
      --warn: #d97706;
      --input-bg: #fff;
      --input-border: #d1d5db;
      --ring-track: #e5e7eb;
      --font: "Inconsolata", monospace;
      --orange: #c2410c;
      --purple: #6d28d9;
      --blue: #1d4ed8;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --text: #d4e4d1;
      --bg: #0a0f0a;
      --accent: #4ade80;
      --muted: #9ca3af;
      --border: #1f2f1e;
      --card: #111a11;
      --hover: rgba(74, 222, 128, .05);
      --success: #4ade80;
      --danger: #f87171;
      --warn: #facc15;
      --input-bg: #152015;
      --input-border: #2a3a28;
      --ring-track: #1f2f1e;
      --orange: #fb923c;
      --purple: #a78bfa;
      --blue: #60a5fa;
    }

    /* Dark mode: use dark text on light-green accent backgrounds for WCAG contrast */
    [data-theme="dark"] .btn-primary,
    [data-theme="dark"] .food-btn-primary,
    [data-theme="dark"] .filter-btn.active,
    [data-theme="dark"] .chat-send,
    [data-theme="dark"] .login-btn,
    [data-theme="dark"] .chat-msg.user {
      color: #0a1f00
    }

    [data-theme="dark"] .food-btn-primary:hover,
    [data-theme="dark"] .filter-btn.active:hover {
      color: #0a1f00
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      font-size: 18.3px
    }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
      max-width: 44rem;
      margin: 0 auto;
      padding: 1rem 1rem 5.5rem;
      transition: background-color .3s;
      min-height: 100vh
    }

    a {
      color: var(--accent);
      text-decoration: none
    }

    a:hover {
      text-decoration: underline
    }

    /* Header heart: solid in light mode, outlined in dark mode */
    header .hdr-left .icon svg {
      fill: var(--accent);
    }

    [data-theme="dark"] header .hdr-left .icon svg {
      fill: none;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: .75rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border)
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: .6rem
    }

    .hdr-left h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -.02em
    }

    .hdr-left .icon {
      font-size: 1.2rem
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-shrink: 0
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer
    }

    .user-avatar:hover {
      border-color: var(--accent)
    }

    .theme-toggle {
      width: 2.2rem;
      height: 1.8rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
      position: relative;
      flex-shrink: 0
    }

    .theme-toggle:hover {
      border-color: var(--accent)
    }

    .theme-toggle svg {
      width: 14px;
      height: 14px;
      stroke: var(--text);
      fill: none;
      stroke-width: 1.5;
      transition: opacity .3s
    }

    .theme-toggle:hover svg {
      stroke: var(--accent)
    }

    .icon-dark {
      opacity: 0;
      position: absolute
    }

    .icon-light {
      opacity: 1
    }

    [data-theme="dark"] .icon-dark {
      opacity: 1
    }

    [data-theme="dark"] .icon-light {
      opacity: 0
    }

    /* Date Nav */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      margin-bottom: 1.25rem
    }

    .date-nav button {
      padding: .2rem .55rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      font-family: var(--font);
      font-size: .78rem;
      color: var(--muted);
      cursor: pointer;
      background: var(--bg);
      transition: all .2s
    }

    .date-nav button:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .date-label {
      font-size: .82rem;
      font-weight: 600;
      min-width: 9rem;
      text-align: center
    }

    /* User Menu */
    .user-menu {
      position: relative;
      display: flex;
      align-items: center
    }

    .user-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: .3rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .12);
      padding: .25rem;
      min-width: 130px;
      display: none;
      z-index: 50
    }

    .user-dropdown.show {
      display: block
    }

    .user-dropdown button {
      font-family: var(--font);
      font-size: .8rem;
      width: 100%;
      text-align: left;
      padding: .45rem .6rem;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text);
      border-radius: 4px;
      transition: background .15s
    }

    .user-dropdown button:hover {
      background: var(--card)
    }

    /* Login */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1.5rem;
      text-align: center
    }

    .login-screen h2 {
      font-size: 1.4rem;
      font-weight: 600
    }

    .login-screen p {
      color: var(--muted);
      max-width: 28rem;
    }

    .login-btn {
      font-family: var(--font);
      font-size: .9rem;
      font-weight: 500;
      padding: .7rem 1.8rem;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: all .2s
    }

    .login-btn:hover {
      opacity: .9;
      transform: translateY(-1px)
    }

    .login-btn svg {
      width: 18px;
      height: 18px
    }

    /* Cards */
    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: .75rem;
      background: var(--card);
      transition: all .3s
    }

    .card-title {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .4rem
    }

    .card-title-status {
      margin-left: auto;
      font-size: .75rem;
      font-weight: 600;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0
    }

    /* Ring */
    .ring-wrap {
      display: flex;
      align-items: center;
      gap: 1.25rem
    }

    .ring-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .ring-center {
      position: absolute;
      text-align: center
    }

    .ring-big {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1
    }

    .ring-small {
      font-size: .72rem;
      color: var(--muted);
      line-height: 1.1
    }

    .ring-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .4rem
    }

    /* Progress Bar */
    .prog {
      margin-bottom: .35rem
    }

    .prog-header {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      margin-bottom: .2rem
    }

    .prog-label {
      color: var(--muted)
    }

    .prog-val {
      font-weight: 600
    }

    .prog-track {
      height: 5px;
      background: var(--ring-track);
      border-radius: 3px;
      overflow: hidden
    }

    .prog-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .5s ease
    }

    /* Stats Row */
    .stats-row {
      display: flex;
      gap: .4rem;
      margin-top: .6rem;
      flex-wrap: wrap
    }

    .stat-box {
      flex: 1;
      text-align: center;
      padding: .4rem;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
      min-width: 60px
    }

    .stat-val {
      font-size: .85rem;
      font-weight: 700
    }

    .stat-label {
      font-size: .58rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em
    }

    /* Food Items */
    .food-actions {
      display: flex;
      gap: .4rem;
      margin-bottom: .6rem;
      flex-wrap: wrap
    }

    .food-btn {
      padding: .3rem .6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font);
      font-size: .7rem;
      font-weight: 600;
      transition: all .2s;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer
    }

    .food-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .food-btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    .food-btn-primary:hover {
      opacity: .9;
      color: #fff
    }

    .food-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: .3rem;
      transition: all .2s
    }

    .food-item:hover {
      border-color: var(--accent)
    }

    .food-icon {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 5px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .food-icon i {
      width: 13px;
      height: 13px;
      stroke: var(--muted);
      stroke-width: 1.5
    }

    .food-info {
      flex: 1;
      min-width: 0
    }

    .food-name {
      font-size: .78rem;
      font-weight: 600;
      overflow-wrap: anywhere
    }

    .food-meta {
      font-size: .62rem;
      color: var(--muted)
    }

    .food-cal {
      font-size: .78rem;
      font-weight: 700;
      flex-shrink: 0
    }

    .food-remove {
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: all .2s;
      flex-shrink: 0;
      font-size: .7rem;
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font)
    }

    .food-remove:hover {
      color: var(--danger);
      background: rgba(220, 38, 38, .08)
    }

    /* Checklist */
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      padding: .4rem .5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
      font-size: .78rem;
      line-height: 1.25
    }

    .check-item:hover {
      background: var(--hover)
    }

    .check-item input {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      margin-top: 1px;
      flex-shrink: 0
    }

    .check-item span {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere
    }

    .opt-tag {
      font-size: .85em;
      color: var(--muted)
    }

    /* Supplement Items */
    .supp-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .35rem .5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent
    }

    .supp-item:hover {
      background: var(--hover)
    }

    .supp-item.taken {
      background: var(--hover);
      border-color: var(--border)
    }

    .supp-icon {
      font-size: .8rem
    }

    .supp-name {
      flex: 1;
      font-size: .78rem
    }

    .supp-freq {
      font-size: .62rem;
      color: var(--muted)
    }

    .supp-check {
      width: .9rem;
      height: .9rem;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      font-size: .6rem
    }

    .supp-item.taken .supp-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    /* Water */
    .water-bar {
      height: 7px;
      background: var(--ring-track);
      border-radius: 4px;
      overflow: hidden;
      margin: .4rem 0
    }

    .water-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), #38bdf8);
      transition: width .5s
    }

    .water-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .78rem
    }

    .water-amt {
      font-weight: 700;
      color: var(--accent)
    }

    /* Form helpers */
    .form-row {
      display: flex;
      gap: .5rem;
      margin-bottom: .6rem;
      align-items: flex-end;
      flex-wrap: wrap
    }

    .form-field {
      flex: 1;
      min-width: 0
    }

    .form-field label {
      display: block;
      font-size: .62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .2rem
    }

    .form-field input,
    .form-field select {
      box-sizing: border-box;
      height: 2.4rem;
      font-family: var(--font);
      font-size: .8rem;
      padding: .45rem .6rem;
      border-radius: 5px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border .2s;
      width: 100%
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--accent)
    }

    .btn-primary {
      font-family: var(--font);
      font-size: .78rem;
      font-weight: 600;
      padding: .5rem .9rem;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap
    }

    .btn-primary:hover {
      opacity: .9
    }

    .btn-secondary {
      font-family: var(--font);
      font-size: .78rem;
      font-weight: 600;
      padding: .5rem .9rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    /* Delight Items */
    .delight-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .4rem .5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s
    }

    .delight-item:hover {
      background: var(--hover)
    }

    .delight-item.checked .delight-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .delight-dot {
      width: 1.1rem;
      height: 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      font-size: .55rem;
      flex-shrink: 0
    }

    .delight-name {
      flex: 1;
      font-size: .78rem
    }

    .delight-emoji {
      font-size: .85rem;
      flex-shrink: 0
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: .3rem 0;
      padding-bottom: env(safe-area-inset-bottom, .3rem);
      transition: background .3s
    }

    .bottom-nav-inner {
      display: flex;
      justify-content: space-around;
      max-width: 44rem;
      margin: 0 auto
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: .3rem .5rem;
      border-radius: 6px;
      transition: all .2s;
      cursor: pointer;
      gap: 1px;
      -webkit-tap-highlight-color: transparent
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      stroke: var(--muted);
      stroke-width: 1.5;
      fill: none;
      transition: stroke .2s
    }

    .nav-item span {
      font-size: .55rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .02em;
      transition: color .2s
    }

    .nav-item.active svg {
      stroke: var(--accent)
    }

    .nav-item.active span {
      color: var(--accent)
    }

    .nav-item:hover svg {
      stroke: var(--accent)
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, .35);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s
    }

    .modal {
      background: var(--card);
      width: 100%;
      max-width: 44rem;
      max-height: 80vh;
      border-radius: 10px 10px 0 0;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: slideUp .25s ease
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .85rem 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1
    }

    .modal-title {
      font-weight: 700;
      font-size: .85rem
    }

    .modal-close {
      padding: .2rem;
      border-radius: 4px;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font)
    }

    .modal-close:hover {
      color: var(--danger)
    }

    .modal-body {
      overflow-y: auto;
      max-height: calc(80vh - 3rem);
      padding: .85rem 1rem
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0)
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      opacity: 0;
      visibility: hidden;
      font-family: var(--font);
      font-size: .8rem;
      font-weight: 500;
      padding: .55rem 1.2rem;
      border-radius: 6px;
      background: var(--text);
      color: var(--bg);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
      z-index: 999;
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1), opacity .3s, visibility .3s;
      pointer-events: none;
      white-space: nowrap
    }

    .toast:empty {
      display: none
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible
    }

    .toast.success {
      background: var(--success);
      color: #fff
    }

    .toast.error {
      background: var(--danger);
      color: #fff
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: .78rem
    }

    .empty-icon {
      margin-bottom: .4rem;
      opacity: .4;
      display: flex;
      justify-content: center
    }

    .empty-icon i {
      width: 24px;
      height: 24px;
      stroke: var(--muted);
      stroke-width: 1.5
    }

    /* Spinner / Loading */
    .auth-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: .6rem;
      text-align: center
    }

    .dot-pulse {
      display: flex;
      gap: .25rem
    }

    .dot-pulse span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease infinite
    }

    .dot-pulse span:nth-child(2) {
      animation-delay: .2s
    }

    .dot-pulse span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        opacity: .3;
        transform: scale(.8)
      }

      40% {
        opacity: 1;
        transform: scale(1.2)
      }
    }

    /* Micros details */
    .micros-details {
      margin-top: .6rem;
      border-top: 1px dashed var(--border);
      padding-top: .6rem
    }

    .micros-details summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .72rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .micros-details summary::-webkit-details-marker {
      display: none
    }

    .micros-details summary::after {
      content: "▾";
      font-size: .9rem;
      color: var(--text);
      opacity: .7;
      transition: transform .2s
    }

    .micros-details[open] summary::after {
      transform: rotate(180deg)
    }

    .micros-details[open] summary {
      color: var(--accent)
    }

    .micros-scroll {
      max-height: 13rem;
      overflow: auto;
      margin-top: .6rem;
      padding-right: .2rem
    }

    /* Plan item in modal */
    .plan-item {
      padding: .7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: .4rem;
      cursor: pointer;
      transition: all .2s
    }

    .plan-item:hover {
      border-color: var(--accent)
    }

    .plan-item.added {
      opacity: .5;
      border-color: var(--success)
    }

    .plan-meal-tag {
      font-size: .58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted)
    }

    .plan-meal-name {
      font-size: .78rem;
      font-weight: 600;
      margin-top: .1rem
    }

    .plan-meal-desc {
      font-size: .68rem;
      color: var(--muted);
      margin-top: .1rem;
      line-height: 1.4
    }

    .plan-meal-macros {
      display: flex;
      gap: .6rem;
      margin-top: .3rem;
      font-size: .62rem
    }

    .plan-meal-macros span:first-child {
      font-weight: 600;
      color: var(--accent)
    }

    /* Chart bars */
    .chart-section {
      margin-bottom: .6rem
    }

    .chart-title {
      font-size: .68rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 90px;
      padding-top: .4rem
    }

    .chart-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      justify-content: flex-end
    }

    .chart-bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      transition: height .5s;
      min-height: 2px
    }

    .chart-bar-label {
      font-size: .65rem;
      color: var(--muted);
      height: 14px;
      display: flex;
      align-items: flex-end
    }

    .chart-bar-val {
      font-size: .65rem;
      font-weight: 600;
      min-height: 12px
    }

    /* Pixel heart animation (login screen) */
    @keyframes pixel-beat {

      0%,
      100% {
        transform: scale(1);
      }

      14% {
        transform: scale(1.18);
      }

      28% {
        transform: scale(1);
      }

      42% {
        transform: scale(1.12);
      }

      56% {
        transform: scale(1);
      }
    }

    .pixel-heart {
      display: inline-block;
      animation: pixel-beat 1.2s ease-in-out infinite;
      image-rendering: pixelated;
      line-height: 1;
    }

    /* Trend lines */
    .trend {
      width: 100%
    }

    /* Chart tooltips (SVG hover/tap) */
    .chart-pt .chart-tip {
      opacity: 0;
      transition: opacity .15s;
      pointer-events: none;
    }

    .chart-pt:hover .chart-tip,
    .chart-pt:focus .chart-tip,
    .chart-pt.active .chart-tip {
      opacity: 1;
    }

    .chart-pt {
      cursor: pointer;
      outline: none;
    }

    .chart-bar-wrap:hover .chart-tip-bar,
    .chart-bar-wrap:focus .chart-tip-bar,
    .chart-bar-wrap.active .chart-tip-bar {
      opacity: 1;
    }

    .chart-tip-bar {
      opacity: 0;
      transition: opacity .15s;
      pointer-events: none;
    }

    .trend svg {
      width: 100%;
      height: 100px;
      display: block
    }

    .trend-labels {
      display: flex;
      justify-content: space-between;
      font-size: .55rem;
      color: var(--muted);
      margin-top: .2rem
    }

    /* Danger Zone */
    .danger-zone {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border)
    }

    .danger-zone-label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--danger);
      margin-bottom: .5rem
    }

    .delete-btn {
      font-family: var(--font);
      font-size: .78rem;
      font-weight: 500;
      padding: .45rem .85rem;
      border-radius: 5px;
      border: 1px solid var(--danger);
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      transition: all .2s
    }

    .delete-btn:hover {
      background: var(--danger);
      color: #fff
    }

    /* Delete Modal */
    .modal-overlay-center {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100
    }

    .modal-overlay-center.show {
      display: flex
    }

    .modal-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .15)
    }

    .modal-box h3 {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: .5rem
    }

    .modal-box p {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.5
    }

    .modal-actions {
      display: flex;
      gap: .4rem;
      justify-content: flex-end
    }

    .modal-cancel {
      font-family: var(--font);
      font-size: .78rem;
      padding: .4rem .85rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer
    }

    .modal-danger-btn {
      font-family: var(--font);
      font-size: .78rem;
      padding: .4rem .85rem;
      border-radius: 5px;
      border: none;
      background: var(--danger);
      color: #fff;
      cursor: pointer
    }

    /* Custom grid */
    .custom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .4rem;
      margin-bottom: .6rem
    }

    .custom-full {
      grid-column: 1/-1
    }

    /* Filter controls */
    .filter-controls {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem
    }

    .filter-btn {
      padding: .3rem .6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font);
      font-size: .68rem;
      font-weight: 600;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      transition: all .2s
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    /* Responsive */
    @media(max-width:600px) {
      body {
        padding: .8rem .75rem 5.5rem
      }

      .ring-wrap {
        gap: .8rem
      }

      .custom-grid {
        grid-template-columns: 1fr
      }

      .form-row {
        flex-direction: column;
        align-items: stretch;
      }

      .form-row.form-row-btn {
        flex-direction: row;
        align-items: flex-end;
      }

      .stats-row {
        gap: .3rem
      }
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    /* Chat / Advisor */
    .chat-section {
      margin-top: 1rem;
      padding-top: .8rem;
      border-top: 1px solid var(--border)
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: .6rem;
      padding-right: .2rem
    }

    .chat-msg {
      font-size: .78rem;
      line-height: 1.5;
      padding: .5rem .7rem;
      border-radius: 6px;
      max-width: 88%;
      white-space: pre-wrap
    }

    .chat-msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 2px
    }

    .chat-msg.assistant {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px
    }

    .chat-input-row {
      display: flex;
      gap: .4rem
    }

    .chat-input {
      flex: 1;
      font-family: var(--font);
      font-size: .8rem;
      padding: .45rem .6rem;
      border-radius: 5px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      outline: none
    }

    .chat-input:focus {
      border-color: var(--accent)
    }

    .chat-send {
      font-family: var(--font);
      font-size: .78rem;
      font-weight: 600;
      padding: .45rem .85rem;
      border-radius: 5px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      white-space: nowrap
    }

    .chat-send:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    /* Water log items */
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .2rem .3rem;
      font-size: .68rem;
      border-radius: 4px
    }

    .log-item:hover {
      background: var(--hover)
    }

    .log-del {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: .9rem;
      cursor: pointer;
      padding: .15rem .25rem;
      border-radius: 6px;
      font-family: var(--font)
    }

    .log-del:hover {
      color: var(--danger);
      background: rgba(220, 38, 38, .08)
    }

    /* Cap screen */
    .cap-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: .8rem;
      text-align: center
    }

    .cap-screen p {
      color: var(--muted);
      max-width: 24rem;
      font-size: .85rem
    }

    /* Collapsible move sections */
    .move-section {
      border: none;
      margin: 0
    }

    .move-section summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 0
    }

    .move-section summary::-webkit-details-marker {
      display: none
    }

    .move-section summary::after {
      content: "▾";
      margin-left: auto;
      font-size: .9rem;
      color: var(--text);
      opacity: .7;
      transition: transform .2s
    }

    .move-section[open] summary::after {
      transform: rotate(180deg)
    }

    .move-section[open] summary {
      color: var(--accent)
    }

    .move-section .section-body {
      margin-top: .5rem
    }

    /* Pull-to-refresh */
    .ptr-indicator {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%) translateY(-100%);
      z-index: 200;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
      transition: transform .2s, opacity .2s;
      opacity: 0;
      pointer-events: none
    }

    .ptr-indicator.visible {
      opacity: 1
    }

    .ptr-indicator.refreshing {
      animation: ptrSpin .8s linear infinite
    }

    @keyframes ptrSpin {
      to {
        transform: translateX(-50%) rotate(360deg)
      }
    }

    .ptr-indicator svg {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2
    }

    /* Profile Modal */
    .profile-modal .modal-body {
      padding: 1rem
    }

    .profile-section {
      margin-bottom: 1.2rem
    }

    .profile-section-title {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .5rem;
      display: flex;
      align-items: center;
      gap: .4rem
    }

    .profile-option {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .5rem .6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      margin-bottom: .4rem;
      cursor: pointer;
      transition: all .2s;
      font-size: .78rem
    }

    .profile-option:hover {
      border-color: var(--accent)
    }

    .profile-option.selected {
      border-color: var(--accent);
      background: var(--hover)
    }

    .profile-option input[type="radio"],
    .profile-option input[type="checkbox"] {
      accent-color: var(--accent);
      flex-shrink: 0
    }

    .profile-option label {
      flex: 1;
      cursor: pointer;
      font-size: .78rem
    }

    .mode-toggle-wrap {
      display: flex;
      justify-content: center;
      padding: .3rem 0
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      cursor: pointer;
      gap: 0;
      user-select: none;
      position: relative
    }

    .mode-toggle .mode-label-left,
    .mode-toggle .mode-label-right {
      display: flex;
      align-items: center;
      gap: .25rem;
      font-size: .75rem;
      font-weight: 500;
      padding: .35rem .75rem;
      border-radius: 999px;
      transition: opacity .2s;
      z-index: 1;
      pointer-events: none
    }

    .mode-toggle .mode-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc(50% - 3px);
      bottom: 3px;
      background: var(--accent);
      border-radius: 999px;
      transition: transform .25s cubic-bezier(.4, 0, .2, 1);
      z-index: 0
    }

    .profile-inline-input {
      width: 60px;
      font-family: var(--font);
      font-size: .78rem;
      padding: .3rem .4rem;
      border-radius: 5px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      text-align: center;
      outline: none
    }

    .profile-inline-input:focus {
      border-color: var(--accent)
    }

    .profile-chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .35rem .65rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: .72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      background: var(--bg);
      color: var(--text);
      margin-right: .3rem;
      margin-bottom: .3rem
    }

    .profile-chip:hover {
      border-color: var(--accent)
    }

    .profile-chip.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff
    }

    [data-theme="dark"] .profile-chip.active {
      color: #0a1f00
    }

    .profile-chip i {
      width: 14px;
      height: 14px
    }

    .gamified-badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .25rem .6rem;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--warn), var(--orange));
      color: #fff;
      opacity: .7
    }

    /* Lucide icon helper */
    .icon-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      height: 1em;
      vertical-align: -0.125em
    }

    .card-title i,
    .move-section summary i {
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      stroke-width: 1.5;
      flex-shrink: 0
    }

    .move-section[open] summary i {
      stroke: var(--accent)
    }

    .supp-icon i {
      width: 16px;
      height: 16px;
      stroke-width: 1.5
    }

    .delight-emoji i {
      width: 18px;
      height: 18px;
      stroke-width: 1.5
    }
  </style>
</head>

  <!-- Pull-to-refresh indicator -->

    <svg viewBox="0 0 24 24">

  <div id="loginScreen" class="login-screen" style="display:none;">
    <div class="pixel-heart"><svg width="48" height="48" viewBox="0 0 11 10" style="display:block"

        <!-- pixel art heart grid (11×10) -->
        <rect x="1" y="0" width="3" height="1" fill="var(--accent)" />
        <rect x="7" y="0" width="3" height="1" fill="var(--accent)" />

        <rect x="4" y="9" width="3" height="1" fill="var(--accent)" />
      </svg></div>
    <h2>HealThee</h2>
    <p style="font-size:0.94rem;">Track nutrition, workouts, habits and more.<br>All in one place.</p>
    <button class="login-btn" onclick="signInWithGoogle()">

      window.computeTotals = function (d) {
        const foods = activeItems(d?.foods || []);
        const t = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, micros: {} };
        for (const f of foods) {
          t.cal += num0(f.cal); t.protein += num0(f.protein); t.carbs += num0(f.carbs); t.fat += num0(f.fat); t.fiber += num0(f.fiber);
          if (f.micros && typeof f.micros === "object") for (const [k, v] of Object.entries(f.micros)) { t.micros[k] = (t.micros[k] || 0) + num0(v); }
        }

        SUPPLEMENTS.forEach(s => {
          if (lwwGet(d?.supplementChecks, s.id)) {
            t.cal += num0(s.cal); t.protein += num0(s.protein); t.carbs += num0(s.carbs); t.fat += num0(s.fat); t.fiber += num0(s.fiber);
            if (s.micros) for (const [k, v] of Object.entries(s.micros)) { t.micros[k] = (t.micros[k] || 0) + num0(v); }
          }
        });

        t.cal = Math.round(t.cal); t.protein = Math.round(t.protein * 10) / 10; t.carbs = Math.round(t.carbs * 10) / 10;
        t.fat = Math.round(t.fat * 10) / 10; t.fiber = Math.round(t.fiber * 10) / 10;
        return t;
      }

      window.recompute = function () {
        dayData.water = activeItems(dayData.waterLogs).reduce((s, l) => s + num0(l.ml), 0);
        dayData.steps = activeItems(dayData.stepLogs).reduce((s, l) => s + Math.round(num0(l.steps)), 0);
        const w = num0(dayData.body?.weight);
        const walk = dayData.steps > 0 ? estimateWalkCal(dayData.steps, w || 70) : 0;
        const customItems = activeItems(dayData.customExercises);
        const customNeat = customItems.filter(x => x.isNeat).reduce((s, x) => s + num0(x.kcal), 0);
        const customEx = customItems.filter(x => !x.isNeat).reduce((s, x) => s + num0(x.kcal), 0);
        // Exercise kcal from checked workout items
        let exKcal = 0;
        const d = dow(selectedDate);
        const wo = WORKOUT_PLAN[d];
        if (wo) wo.exercises.forEach(ex => { if (lwwGet(dayData.exerciseChecks, ex)) exKcal += (EXERCISE_KCAL[ex] || 30); });
        (WARMUP_PLAN[d] || []).forEach(ex => { if (lwwGet(dayData.warmupChecks, ex.id)) exKcal += num0(ex.kcal); });
        (COOLDOWN_PLAN[d] || []).forEach(ex => { if (lwwGet(dayData.cooldownChecks, ex.id)) exKcal += num0(ex.kcal); });
        PELVIC_EXERCISES.forEach(ex => { if (lwwGet(dayData.pelvicChecks, ex.id)) exKcal += num0(ex.kcal); });
        dayData.neatCal = Math.round(walk + customNeat);
        dayData.exerciseCal = Math.round(exKcal + customEx);
        dayData.calBurned = Math.round(dayData.neatCal + dayData.exerciseCal);

        const r = (size - stroke) / 2, c = 2 * Math.PI * r;

        return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
        <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="var(--ring-track)" stroke-width="${stroke}"/>
        <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/></svg>`;

      /* Detect environments where popups won't work */
      function shouldUseRedirect() {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
        const ua = navigator.userAgent || '';
        const isInApp = /FBAN|FBAV|Instagram|Line\/|Twitter|MicroMessenger/i.test(ua);
        return isStandalone || isInApp;

      /* 5-second fallback: if Firebase auth doesn't resolve, show login screen */

          document.getElementById('authLoading').style.display = 'none';
          document.getElementById('loginScreen').style.display = 'flex';

      }, 5000);

      auth.onAuthStateChanged(async user => {
        authResolved = true;
        clearTimeout(authFallbackTimer);

        if (user) {
          currentUser = user;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("userMenu").style.display = "flex";
          document.getElementById("userAvatar").src = user.photoURL || "";

            const doc = await db.collection("users").doc(user.uid).get();

              document.getElementById("mainApp").style.display = "block";
              document.getElementById("bottomNav").style.display = "block";
              initApp();
            } else {
              const statsDoc = await db.collection("metadata").doc("stats").get();

              if (cnt >= MAX_USERS) { document.getElementById("capScreen").style.display = "flex"; return; }
              await db.runTransaction(async tx => {
                const s = await tx.get(db.collection("metadata").doc("stats"));
                const c = s.exists ? (s.data().userCount || 0) : 0;
                if (c >= MAX_USERS) throw new Error("CAP");
                tx.set(db.collection("users").doc(user.uid), {
                  displayName: user.displayName || "", email: user.email || "", photoURL: user.photoURL || "",
                  createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                tx.set(db.collection("metadata").doc("stats"), { userCount: c + 1 }, { merge: true });
              });
              document.getElementById("mainApp").style.display = "block";
              document.getElementById("bottomNav").style.display = "block";
              toast("Welcome! Setup complete.", "success");

      window.signInWithGoogle = function () {
        const provider = new firebase.auth.GoogleAuthProvider();
        const loginBtn = document.querySelector('.login-btn');
        if (loginBtn) { loginBtn.disabled = true; loginBtn.style.opacity = '0.6'; }

        if (shouldUseRedirect()) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('authLoading').style.display = 'flex';
          auth.signInWithRedirect(provider);
          return;
        }

        auth.signInWithPopup(provider).catch(e => {
          const code = e.code || '';

          // Popup blocked or unsupported → fall back to redirect
          if (code === 'auth/popup-blocked' ||
            code === 'auth/operation-not-supported-in-this-environment' ||
            code === 'auth/internal-error') {
            console.log('[Auth] Popup failed (' + code + '), falling back to redirect');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('authLoading').style.display = 'flex';
            auth.signInWithRedirect(provider);
            return;
          }

          // User closed popup — just re-enable button
          if (code === 'auth/popup-closed-by-user' || code === 'auth/popup-closed-by-browser' ||
            code === 'auth/cancelled-popup-request') {
            if (loginBtn) { loginBtn.disabled = false; loginBtn.style.opacity = '1'; }
            return;

          if (code === 'auth/network-request-failed') {
            toast('Network error — check your connection', 'error');

      /* ── localStorage instant-render cache ───────────────────────────── */
      const HT_C = 'HT_C_';
      window._htWriteCache = function (uid, date, day, profile) {
        try {
          localStorage.setItem(HT_C + 'uid', uid);
          localStorage.setItem(HT_C + 'date', date);
          if (day) localStorage.setItem(HT_C + 'day', JSON.stringify(day));
          if (profile) localStorage.setItem(HT_C + 'profile', JSON.stringify(profile));
        } catch (_) { }
      };
      window._htReadCache = function () {
        try {
          const uid = localStorage.getItem(HT_C + 'uid');
          const date = localStorage.getItem(HT_C + 'date');
          const day = JSON.parse(localStorage.getItem(HT_C + 'day') || 'null');
          const prof = JSON.parse(localStorage.getItem(HT_C + 'profile') || 'null');
          return uid && date ? { uid, date, day, profile: prof } : null;
        } catch (_) { return null; }
      };
      window._htClearCache = function () {
        try { [HT_C + 'uid', HT_C + 'date', HT_C + 'day', HT_C + 'profile'].forEach(k => localStorage.removeItem(k)); } catch (_) { }

      // ── Pull-to-refresh ──
      window.setupPullToRefresh = function () {
        let startY = 0, pulling = false;
        const ptr = document.getElementById("ptrIndicator");
        const mainApp = document.getElementById("mainApp");

        document.addEventListener("touchstart", e => {
          if (window.scrollY === 0 && e.touches.length === 1) {
            startY = e.touches[0].clientY;
            pulling = true;
          }
        }, { passive: true });

        document.addEventListener("touchmove", e => {
          if (!pulling) return;
          const dy = e.touches[0].clientY - startY;
          if (dy > 10 && dy < 150) {
            ptr.style.transform = `translateX(-50%) translateY(${Math.min(dy - 20, 40)}px)`;
            ptr.classList.add("visible");
          }
        }, { passive: true });

        document.addEventListener("touchend", e => {
          if (!pulling) return;
          pulling = false;
          const dy = (e.changedTouches[0]?.clientY || 0) - startY;
          if (dy > 80) {
            ptr.classList.add("refreshing");
            ptr.style.transform = `translateX(-50%) translateY(30px)`;

            setTimeout(() => {
              ptr.classList.remove("visible", "refreshing");
              ptr.style.transform = `translateX(-50%) translateY(-100%)`;

            }, 600);
          } else {
            ptr.classList.remove("visible");
            ptr.style.transform = `translateX(-50%) translateY(-100%)`;
          }
        }, { passive: true });
      }

{"fiber": number, "micros": { "vitamin_a_ug": number, "vitamin_d_ug": number, "vitamin_k": number, "vitamin_b6": number, "vitamin_b12": number, "vitamin_c_mg": number, "calcium_mg": number, "iron_mg": number, "magnesium_mg": number, "sodium_mg": number, "potassium_mg": number, "zinc_mg": number }}`;

      window.addCustomFood = async function () {
        const n = document.getElementById("cfName").value.trim();
        const meal = document.getElementById("cfMeal").value;
        const desc = document.getElementById("cfDesc").value.trim();
        const isRecipe = document.getElementById('cfIsRecipe').checked;

        let c = 0, p = 0, cb = 0, f = 0, fb = 0, hasMacros = false;
        if (!isRecipe && !currentFoodPhotoBase64) {
          if (!n) { toast("Enter a name"); return; }
          c = parseFloat(document.getElementById("cfCal").value) || 0;
          p = parseFloat(document.getElementById("cfPro").value) || 0;
          cb = parseFloat(document.getElementById("cfCarb").value) || 0;
          f = parseFloat(document.getElementById("cfFat").value) || 0;
          fb = parseFloat(document.getElementById("cfFib").value) || 0;
          hasMacros = c > 0 || p > 0 || cb > 0 || f > 0;
        }

        const btn = document.getElementById("cfBtn");
        btn.textContent = "Estimating AI...";
        btn.disabled = true;

        let finalData = { name: n || (currentFoodPhotoBase64 ? 'Image Analysis' : 'Recipe'), desc, meal, cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, micros: {}, estimated: false };

        const sysBase = `{"fiber": number, "micros": { "vitamin_a_ug": number, "vitamin_d_ug": number, "vitamin_k": number, "vitamin_b6": number, "vitamin_b12": number, "vitamin_c_mg": number, "calcium_mg": number, "iron_mg": number, "magnesium_mg": number, "sodium_mg": number, "potassium_mg": number, "zinc_mg": number }}`;
        const sysFull = `{"name": string, "cal": number, "protein": number, "carbs": number, "fat": number, ` + sysBase.slice(1);

        // Helper: check if estimation returned all-zero macros
        const isAllZero = (est) => !est || (num0(est.cal) === 0 && num0(est.protein) === 0 && num0(est.carbs) === 0 && num0(est.fat) === 0);

        try {
          if (currentFoodPhotoBase64) {
            const userPortion = (document.getElementById('cfPortion')?.value || '').trim();
            let visionOk = false;

            if (currentPhotoMode === 'label') {
              // ── Pipeline 1: Label OCR + Portion Scaling ──────────────────
              try {
                btn.textContent = "Reading label...";
                const labelSys = `You are a nutrition label OCR expert. Extract the exact macro values from the nutrition label in this image. Also extract the serving size shown on the label. Reply ONLY with this JSON: {"name":string,"servingSize":string,"servingSizeG":number,"cal":number,"protein":number,"carbs":number,"fat":number,"fiber":number,"micros":{"vitamin_a_ug":number,"vitamin_d_ug":number,"vitamin_k":number,"vitamin_b6":number,"vitamin_b12":number,"vitamin_c_mg":number,"calcium_mg":number,"iron_mg":number,"magnesium_mg":number,"sodium_mg":number,"potassium_mg":number,"zinc_mg":number}}`;
                const labelPmt = `Extract ALL nutrition values exactly as shown on this label. Include the serving size. Do not estimate — read the exact printed values.`;
                const raw = await fetchVisionLLM(labelPmt, labelSys, currentFoodPhotoBase64, 'groq', 'llama-3.2-90b-vision-preview');
                // Portion scaling
                let scaleFactor = 1;
                if (userPortion && raw.servingSizeG > 0) {
                  const portionG = parsePortionToG(userPortion, raw.servingSizeG);
                  if (portionG > 0) scaleFactor = portionG / raw.servingSizeG;
                }
                const scaled = {
                  name: n || raw.name || 'Label food',
                  cal: Math.round((raw.cal || 0) * scaleFactor),
                  protein: Math.round((raw.protein || 0) * scaleFactor * 10) / 10,
                  carbs: Math.round((raw.carbs || 0) * scaleFactor * 10) / 10,
                  fat: Math.round((raw.fat || 0) * scaleFactor * 10) / 10,
                  fiber: Math.round((raw.fiber || 0) * scaleFactor * 10) / 10,
                  micros: Object.fromEntries(Object.entries(raw.micros || {}).map(([k, v]) => [k, Math.round((v || 0) * scaleFactor * 10) / 10])),
                };
                finalData = { ...finalData, ...scaled, meal, desc: desc || `Label (${raw.servingSize || ''}${userPortion ? ' → ' + userPortion : ''})`, estimated: false };
                toast(scaleFactor !== 1 ? `Label scanned · scaled to ${userPortion}` : "Label scanned", "success");
                visionOk = true;
              } catch (labelErr) {
                console.warn("Label OCR failed:", labelErr.message);
              }

            } else {
              // ── Pipeline 2: Meal Photo — 90B + two-call approach ─────────
              try {
                btn.textContent = "Identifying foods...";
                // Call 1: identify items + weights
                const itemsSys = `You are a food recognition expert. Identify every distinct food item visible in this image and estimate its weight in grams. Reply ONLY with JSON: {"items":[{"name":string,"weightG":number}]}`;
                const itemsPmt = `List every food item you can see in this image with an estimated weight in grams.`;
                const itemsRes = await fetchVisionLLM(itemsPmt, itemsSys, currentFoodPhotoBase64, 'groq', 'llama-3.2-90b-vision-preview');
                const items = itemsRes?.items || [];

                let totalMacros = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, micros: {} };
                if (items.length > 0) {
                  btn.textContent = "Estimating macros...";
                  // Call 2: macros per 100g for each item
                  const macroSys = `You are a nutrition database. For each food item in the list, provide macros per 100g. Reply ONLY with JSON: {"items":[{"name":string,"cal":number,"protein":number,"carbs":number,"fat":number,"fiber":number}]}`;
                  const macroPmt = `Provide macros per 100g for each of these foods: ${items.map(it => it.name).join(', ')}`;
                  const macroRes = await fetchLLM(macroPmt, macroSys, 'cerebras', 'llama3.1-8b');
                  const macroItems = macroRes?.items || [];
                  // Sum up totals: macros × (weight / 100)
                  items.forEach(it => {
                    const m = macroItems.find(x => x.name?.toLowerCase() === it.name?.toLowerCase()) || macroItems[0];
                    if (!m) return;
                    const f = (it.weightG || 100) / 100;
                    totalMacros.cal += Math.round((m.cal || 0) * f);
                    totalMacros.protein += (m.protein || 0) * f;
                    totalMacros.carbs += (m.carbs || 0) * f;
                    totalMacros.fat += (m.fat || 0) * f;
                    totalMacros.fiber += (m.fiber || 0) * f;
                  });
                  totalMacros.protein = Math.round(totalMacros.protein * 10) / 10;
                  totalMacros.carbs = Math.round(totalMacros.carbs * 10) / 10;
                  totalMacros.fat = Math.round(totalMacros.fat * 10) / 10;
                  totalMacros.fiber = Math.round(totalMacros.fiber * 10) / 10;
                  // Micros via a single extra LLM call
                  try {
                    const microRes = await fetchLLM(`Meal: ${n || items.map(it => `${it.name} ${it.weightG}g`).join(', ')}. Macros: ${totalMacros.cal}kcal P:${totalMacros.protein}g`, `Estimate micronutrients for this meal. Reply ONLY with JSON: {"micros":{"vitamin_a_ug":number,"vitamin_d_ug":number,"vitamin_k":number,"vitamin_b6":number,"vitamin_b12":number,"vitamin_c_mg":number,"calcium_mg":number,"iron_mg":number,"magnesium_mg":number,"sodium_mg":number,"potassium_mg":number,"zinc_mg":number}}`, 'cerebras', 'llama3.1-8b');
                    totalMacros.micros = microRes?.micros || {};
                  } catch (_) { }
                }

                if (totalMacros.cal > 0) {
                  finalData = { ...finalData, ...totalMacros, name: n || items.map(i => i.name).join(' + ') || 'Meal', meal, desc: desc || items.map(it => `${it.name} ~${it.weightG}g`).join(', '), estimated: true };
                  toast("Meal analysed", "success");
                  visionOk = true;
                }
              } catch (mealErr) {
                console.warn("Meal vision failed:", mealErr.message);
              }
            }

            if (!visionOk) {
              if (!n && !desc) throw new Error("Image analysis unavailable. Please add a food name.");
              btn.textContent = "Estimating (text)...";
              const fbPrompt = `Food: ${n || 'Food from photo'} ${desc}. Assume 1 standard Indian serving.`;
              const est = await fetchLLM(fbPrompt, `You are a nutrition estimator for Indian foods. Estimate ALL macros and micros. Reply ONLY with JSON: ${sysFull}`, 'cerebras', 'llama3.1-8b');
              finalData = { ...finalData, ...est, name: n || 'Food from photo', desc: desc || 'From photo', meal, estimated: true };
              toast("Added (text estimate – image analysis unavailable)", "warn");
            }
          } else if (isRecipe) {
            // Recipe/Ingredients processing via DB + LLM
            if (!desc) { toast("Enter ingredients", "warn"); btn.textContent = "Add Food"; btn.disabled = false; return; }
            const lines = desc.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            btn.textContent = "Looking up ingredients...";
            let est;
            if (lines.length > 0 && /\d/.test(desc)) {
              // Structured ingredient list — use DB + LLM
              est = await estimateFromIngredients(lines, n);
              const src = est._dbHits > 0 ? `${est._dbHits} from DB${est._llmItems > 0 ? ` + ${est._llmItems} via AI` : ''}` : 'AI estimated';
              if (n) est.name = n;
              toast(`Added Recipe (${src})`, "success");
            } else {
              // Free-form description — fall back to LLM as before
              const sysMix = `You are a recipe/food nutrition analyzer for Indian foods. Given ingredients or a dish description, estimate the TOTAL macros and micronutrients for the entire prepared dish (1 standard Indian serving). All values must be realistic and non-zero where applicable. Reply ONLY with JSON: ${sysFull}`;
              est = await fetchLLM(`Recipe/Ingredients:\n${desc}${n ? '\nDish name: ' + n : ''}`, sysMix, 'cerebras', 'llama3.1-8b');
              if (isAllZero(est)) {
                est = await fetchLLM(`Estimate nutrition for: ${n || 'Recipe'} (${desc}).`, `You are a nutrition estimator for Indian foods. You MUST provide realistic non-zero values. Reply ONLY with JSON: ${sysFull}`, 'cerebras', 'llama3.1-8b');
              }
              if (n) est.name = n;
              toast("Added Recipe", "success");
            }
            finalData = { ...finalData, ...est, meal, estimated: true };
            if (n) finalData.name = n;
            finalData.desc = desc;

          } else if (hasMacros) {
            finalData.cal = c > 0 ? c : Math.round(p * 4 + cb * 4 + f * 9);
            finalData.protein = p; finalData.carbs = cb; finalData.fat = f; finalData.fiber = fb;
            const prompt = `Food: ${n} ${desc}. Macros: ${finalData.cal}kcal, P:${p}g, C:${cb}g, F:${f}g, Fib:${fb}g.`;
            const sysMicros = `You are a nutrition estimator for Indian foods. You MUST estimate realistic non-zero micronutrients based on the food name and macros. Reply ONLY with JSON: ${sysBase}`;
            let est = await fetchLLM(prompt, sysMicros, 'cerebras', 'llama3.1-8b');

            const isMicrosZero = Object.values(est?.micros || {}).every(v => num0(v) === 0);
            if (isMicrosZero) {
              console.warn('Micros estimation returned all zeros, retrying...');
              est = await fetchLLM(`Estimate ONLY detailed micronutrients for: ${n} (${desc}). You MUST provide realistic non-zero values.`, sysMicros, 'cerebras', 'llama3.1-8b');
              console.log('Micros retry:', JSON.stringify(est));
            }

            if (!fb) finalData.fiber = est.fiber || 0;
            finalData.micros = est.micros || {};
            toast("Added with estimated micros", "success");

          } else {
            // ── Pipeline 3: Two-stage LLM validation ─────────────────────
            const prompt = `Food: ${n} ${desc}. Assume 1 standard Indian serving size. Include all macros (protein, carbs, fat) — carbs should account for any sauce, gravy, onions, spices, or starchy components.`;
            let est = await fetchLLM(prompt, `You are a nutrition estimator for Indian foods. Estimate ALL macros (cal, protein, carbs, fat), fiber, and micronutrients for a standard serving. Carbs must include starchy components, sauces, and gravies. All values must be realistic and non-zero where applicable. Reply ONLY with JSON: ${sysFull}`, 'cerebras', 'llama3.1-8b');
            console.log('Food LLM Stage 1:', JSON.stringify(est));
            // Stage 2: validation pass
            if (!isAllZero(est)) {
              try {
                btn.textContent = "Validating...";
                const valPrompt = `I estimated nutrition for "${n || desc}": ${est.cal}kcal, protein:${est.protein}g, carbs:${est.carbs}g, fat:${est.fat}g, fiber:${est.fiber}g. Does this look accurate for a typical Indian serving? If any value is clearly wrong (e.g. zero carbs for a rice dish, unrealistically high protein), correct it. Otherwise return the same values unchanged.`;
                const validated = await fetchLLM(valPrompt, `You are a nutrition fact-checker for Indian foods. Validate or correct the given estimate. Reply ONLY with JSON: ${sysFull}`, 'cerebras', 'llama3.1-8b');
                console.log('Food LLM Stage 2 (validated):', JSON.stringify(validated));
                if (!isAllZero(validated)) est = validated;
              } catch (valErr) {
                console.warn('Validation pass failed, using stage-1 estimate:', valErr.message);
              }
            } else {
              console.warn('Food estimation returned all zeros, retrying...');
              est = await fetchLLM(`Estimate detailed nutrition for 1 serving of ${n}. Must include realistic cal, protein, carbs, and fat values.`, `You are a nutrition database. Provide realistic non-zero nutrition values. Reply ONLY with JSON: ${sysFull}`, 'cerebras', 'llama3.1-8b');
            }
            finalData = { ...finalData, ...est, name: n, desc: desc, meal: meal, estimated: true };
            toast("Added (AI estimated + validated)", "success");
          }

          addFood(finalData);
          currentFoodPhotoBase64 = null;
          closeModal();
        } catch (e) {
          console.error("Estimation failed", e);
          if (hasMacros && !isRecipe && !currentFoodPhotoBase64) {
            addFood(finalData);
            closeModal();
            toast("Added without micros (No API Key or Error)", "warn");
          } else {
            toast("AI failed. Set API key or enter manually.", "error");
            btn.textContent = "Add Food";
            btn.disabled = false;
          }
        }
      }

              <div class="prog"><div class="prog-header"><span class="prog-label">Fats</span><span class="prog-val" style="color:var(--orange)">${t.fat}/${TARGETS.fat}g</span></div>

              <div style="display:flex;height:10px;border-radius:5px;overflow:hidden;background:var(--ring-track);margin-top:.3rem">
                <div style="width:${t.protein / totalMacro * 100}%;background:var(--accent);transition:width .5s"></div>
                <div style="width:${t.carbs / totalMacro * 100}%;background:var(--warn);transition:width .5s"></div>
                <div style="width:${t.fat / totalMacro * 100}%;background:var(--orange);transition:width .5s"></div></div>
            </div>
          </div>

            <div class="stat-box"><div class="stat-val">${(() => { const fiberGoal = Math.round(14 * calTarget / 1000); const fiberLeft = Math.max(0, Math.round((fiberGoal - t.fiber) * 10) / 10); return fiberLeft + 'g'; })()}</div><div class="stat-label">fiber left</div></div>
            <div class="stat-box"><div class="stat-val" style="color:var(--success)">${burned}</div><div class="stat-label">burned</div></div>
            <div class="stat-box"><div class="stat-val">${net}</div><div class="stat-label">net</div></div>
          </div>
          <details class="micros-details"><summary><span>Micronutrients</span><span style="font-size:.75rem;font-weight:600;text-transform:none;letter-spacing:0">${met}/${MICROS.length} met</span></summary>
            <div class="micros-scroll">${microsHtml}</div></details>
        </div>
        <div class="card">
          <div class="card-title">${licon('utensils')} Food Log</div>

            <button class="food-btn" onclick="showModal('custom')">+ custom</button>
          </div>
          ${foodList}
        </div>
        <div class="card">
          <div class="card-title">${licon('droplet')} Water</div>
          <div class="water-head"><span>${(waterMl / 1000).toFixed(1)} / ${(TARGETS.water / 1000).toFixed(1)} L</span><span class="water-amt">${Math.round(waterPct)}%</span></div>
          <div class="water-bar"><div class="water-fill" style="width:${Math.min(100, waterPct)}%"></div></div>
          <div style="display:flex;gap:.4rem;margin-top:.5rem;align-items:stretch">
            <button class="food-btn food-btn-primary" style="padding:.45rem .8rem;font-size:.78rem;white-space:nowrap;border-radius:8px" onclick="addWater(250)">+ 250 ml</button>
            <div style="flex:1;display:flex;align-items:center;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);padding:0 .6rem;gap:.3rem">
              <input type="number" id="waterInlineInput" placeholder="ml" min="0" step="10" style="border:none;background:transparent;outline:none;font-family:var(--font);font-size:.8rem;color:var(--text);width:100%;padding:.45rem 0">

        ).join("")}</div>` : ""}
        </div>
        <div class="card">
          <div class="card-title">${licon('pill')} Supplements</div>
          ${suppList}

        const dayNum = dow(selectedDate);

        const s = portionStr.toLowerCase().trim();
        const unitMap = { g: 1, gram: 1, grams: 1, kg: 1000, ml: 1, milliliter: 1, millilitre: 1, l: 1000, liter: 1, litre: 1, tsp: 5, teaspoon: 5, tbsp: 15, tablespoon: 15, cup: 240, cups: 240, oz: 28.3, lb: 453.6, scoop: 30, scoops: 30 };
        const m = s.match(/^([\d.\/]+)\s*([a-z]+)?/);
        if (!m) return fallbackG || 0;
        const num = m[1].includes('/') ? parseFloat(m[1].split('/')[0]) / parseFloat(m[1].split('/')[1]) : parseFloat(m[1]);
        const unit = (m[2] || 'g').toLowerCase();
        return num * (unitMap[unit] || 1);
      }

      // Fuzzy ingredient DB lookup
      window.lookupIngredientDB = function (name) {
        const n = name.toLowerCase().trim();
        if (INGREDIENT_DB[n]) return INGREDIENT_DB[n];
        // Partial match: find a key that is contained in the name or vice versa
        const keys = Object.keys(INGREDIENT_DB);
        for (const k of keys) { if (n.includes(k) || k.includes(n)) return INGREDIENT_DB[k]; }
        return null;
      }

      // Parse a single ingredient line: "200g chicken breast" → {name, amountG}
      window.parseIngredientLine = function (line) {
        const unitMap = { g: 1, gram: 1, grams: 1, kg: 1000, ml: 1, milliliter: 1, millilitre: 1, l: 1000, liter: 1, litre: 1, tsp: 5, teaspoon: 5, tbsp: 15, tablespoon: 15, cup: 240, cups: 240, oz: 28.3, lb: 453.6, scoop: 30, scoops: 30 };
        const m = line.trim().match(/^([\d.\/]+)\s*([a-zA-Z]+)?\s+(.+)/);
        if (!m) return { name: line.trim().toLowerCase(), amountG: 100 };
        const num = m[1].includes('/') ? parseFloat(m[1].split('/')[0]) / parseFloat(m[1].split('/')[1]) : parseFloat(m[1]);
        const unit = (m[2] || 'g').toLowerCase();
        const name = m[3].trim().toLowerCase();
        const toG = unitMap[unit];
        if (toG === undefined) {
          // Piece/unit — use serveG from DB or default 100
          const db = lookupIngredientDB(name);
          return { name, amountG: num * (db?.serveG || 100) };
        }
        return { name, amountG: num * toG };
      }

      // Estimate nutrition for ingredient list using DB + LLM fallback
      window.estimateFromIngredients = async function (lines, dishName) {
        const sysBase = `{"fiber": number, "micros": { "vitamin_a_ug": number, "vitamin_d_ug": number, "vitamin_k": number, "vitamin_b6": number, "vitamin_b12": number, "vitamin_c_mg": number, "calcium_mg": number, "iron_mg": number, "magnesium_mg": number, "sodium_mg": number, "potassium_mg": number, "zinc_mg": number }}`;
        const sysFull = `{"name": string, "cal": number, "protein": number, "carbs": number, "fat": number, ` + sysBase.slice(1);
        const parsed = lines.map(parseIngredientLine);
        const found = [], unknown = [];
        parsed.forEach(p => {
          const db = lookupIngredientDB(p.name);
          if (db) found.push({ ...p, db });
          else unknown.push(p);
        });

        // Totals from DB
        let tot = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
        found.forEach(({ db, amountG }) => {
          const f = amountG / 100;
          tot.cal += (db.cal || 0) * f;
          tot.protein += (db.protein || 0) * f;
          tot.carbs += (db.carbs || 0) * f;
          tot.fat += (db.fat || 0) * f;
          tot.fiber += (db.fiber || 0) * f;
        });

        // LLM for unknowns (batch call)
        let llmMacros = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
        if (unknown.length > 0) {
          const unknownList = unknown.map(u => `${u.amountG}g ${u.name}`).join(', ');
          try {
            const llmRes = await fetchLLM(
              `Estimate the combined total nutrition for these ingredients: ${unknownList}`,
              `You are a nutrition estimator. Reply ONLY with JSON: {"cal":number,"protein":number,"carbs":number,"fat":number,"fiber":number}`,
              'cerebras', 'llama3.1-8b'
            );
            llmMacros = llmRes || llmMacros;
          } catch (_) { }
        }

        tot.cal = Math.round(tot.cal + (llmMacros.cal || 0));
        tot.protein = Math.round((tot.protein + (llmMacros.protein || 0)) * 10) / 10;
        tot.carbs = Math.round((tot.carbs + (llmMacros.carbs || 0)) * 10) / 10;
        tot.fat = Math.round((tot.fat + (llmMacros.fat || 0)) * 10) / 10;
        tot.fiber = Math.round((tot.fiber + (llmMacros.fiber || 0)) * 10) / 10;

        // Micros via LLM
        let micros = {};
        try {
          const mRes = await fetchLLM(
            `Dish: ${dishName || 'Recipe'}, ingredients: ${lines.join(', ')}. Total: ${tot.cal}kcal P:${tot.protein}g`,
            `Estimate micronutrients. Reply ONLY with JSON: ${sysBase}`,
            'cerebras', 'llama3.1-8b'
          );
          micros = mRes?.micros || {};
        } catch (_) { }

        return { ...tot, micros, _dbHits: found.length, _llmItems: unknown.length };
      }

        const url = 'https://us-central1-numo-3984a.cloudfunctions.net/healtheeLLM';

        const body = { prompt, system, provider, model, isJson };

        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          if (!res.ok) {
            const err = await res.text();
            throw new Error(`API Error: ${res.status} - ${err}`);
          }

          const data = await res.json();
          const content = data.content;

          if (isJson) {
            try {
              return JSON.parse(content);
            } catch (e) {
              console.error('Failed to parse LLM JSON:', content);
              throw new Error('LLM did not return valid JSON');
            }
          }
          return content;
        } catch (e) {
          // Fall back to Groq on Cerebras availability errors (model not found, 503, 429, etc.)
          const msg = e.message || '';
          const isAvailabilityError = retry && provider === 'cerebras' && (
            msg.includes('model_not_found') || msg.includes('does not exist') ||
            msg.includes('503') || msg.includes('502') || msg.includes('429') ||
            msg.includes('not_found_error') || msg.includes('overloaded') ||
            msg.includes('unavailable') || msg.includes('capacity')

            console.warn('Cerebras unavailable, falling back to Groq:', msg);
            return await window.fetchLLM(prompt, system, 'groq', 'llama-3.3-70b-versatile', isJson, false);
          }
          throw e;
        }
