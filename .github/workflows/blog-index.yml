name: Rebuild blog index

# Regenerates posts.json (the static blog list read by blog.html) and sitemap.xml
# from Firestore. Run it from the Actions tab after publishing a post, or let the
# schedule pick it up. It only commits when something actually changed.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *' # every 6 hours

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build index, post pages, recipes, sitemap
        run: node scripts/build-blog-index.mjs
      - name: Commit if changed
        run: |
          git config user.name "blog-index-bot"
          git config user.email "actions@users.noreply.github.com"
          git add posts.json sitemap.xml blog recipes.html
          if git diff --cached --quiet; then
            echo "nothing changed — nothing to commit."
          else
            git commit -m "chore: rebuild blog index, pages + sitemap [skip ci]"
            git push
          fi
